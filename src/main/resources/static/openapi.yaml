openapi: 3.1.0
info:
  title: Symphony Orchestrator API
  version: 1.0.0
  description: Symphony Orchestrator API for Vertex Workbench provisioning and quota management

security:
  - bearerAuth: []

tags:
  - name: Self
  - name: Directory
  - name: Workbench
  - name: Quotas
  - name: Usage
  - name: Operations

paths:
  /v1/self:
    get:
      tags: [ Self ]
      summary: Get current user identity and roles
      operationId: getSelf
      responses:
        "200":
          description: Caller identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Self" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/self/managed-groups:
    get:
      tags: [ Directory ]
      summary: List distinct managed group pairs derived from *_Managers ↔ *_Users naming convention
      description: |
        Returns distinct pairs (managerGroup ↔ userGroup) that the caller can manage.
        The UI should treat each userGroup as a distinct "team scope" tab/filter.
      operationId: listSelfManagedGroupPairs
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Optional filter by userGroup displayName (contains/prefix implementation-defined)
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: Managed group pairs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedManagedGroupPairs" }
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
        - bearerAuth: [ workbench.manager ]

  /v1/groups/{groupId}:
    get:
      tags: [Directory]
      summary: Get group metadata (only if caller is member or manager of it)
      operationId: getGroup
      parameters:
        - $ref: "#/components/parameters/groupId"
      responses:
        "200":
          description: Group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not allowed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: [workbench.user]

  /v1/groups/{groupId}/members:
    get:
      tags: [Directory]
      summary: List users in a managed *_Users group (distinct group view)
      description: |
        Caller must manage this groupId (i.e., derived from their *_Managers memberships).
        The UI uses this to show group-specific user lists (distinct groups).
      operationId: listManagedGroupMembers
      parameters:
        - $ref: "#/components/parameters/groupId"
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Filter by 1bankid/displayName/email (implementation-defined)
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: Members of the managed user group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedUsers" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not manage this group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  # -------------------------
  # Workbench Instance Lifecycle (User)
  # -------------------------
  /v1/projects/{projectId}/workbench/instances:
    get:
      tags: [Workbench]
      summary: List Workbench instances visible to the caller
      operationId: listWorkbenchInstances
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Instances
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkbenchInstance" }
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
        - bearerAuth: [workbench.user]

    post:
      tags: [Workbench]
      summary: Create a Workbench instance (hard quota enforced; system cap max 3 instances)
      operationId: createWorkbenchInstance
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstanceRequest" }
      responses:
        "202":
          description: Provisioning started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncOperation" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Name conflict
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Rejected due to quota/policy violation (hard limit)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotaViolationError" }
      security:
        - bearerAuth: [workbench.user]

  /v1/projects/{projectId}/workbench/instances/{instanceId}:
    get:
      tags: [Workbench]
      summary: Get a Workbench instance
      operationId: getWorkbenchInstance
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Instance
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkbenchInstance" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: [workbench.user]

    delete:
      tags: [Workbench]
      summary: Delete a Workbench instance
      operationId: deleteWorkbenchInstance
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Deletion started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncOperation" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: [workbench.user]

  /v1/projects/{projectId}/workbench/instances/{instanceId}:start:
    post:
      tags: [Workbench]
      summary: Start a stopped Workbench instance
      operationId: startWorkbenchInstance
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/idempotencyKey"
      responses:
        "202":
          description: Start initiated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncOperation" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Instance is not in a startable state (e.g. already RUNNING)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.user]

  /v1/projects/{projectId}/workbench/instances/{instanceId}:stop:
    post:
      tags: [Workbench]
      summary: Stop a running Workbench instance
      operationId: stopWorkbenchInstance
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/idempotencyKey"
      responses:
        "202":
          description: Stop initiated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncOperation" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Instance is not in a stoppable state (e.g. already STOPPED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.user]

  # -------------------------
  # Usage (User)
  # -------------------------
  /v1/projects/{projectId}/self/usage:
    get:
      tags: [Usage]
      summary: Get my current Workbench usage and remaining quota (computed via Cloud Asset Inventory)
      operationId: getSelfUsage
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
      responses:
        "200":
          description: Usage snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserQuotaUsage" }
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
        - bearerAuth: [workbench.user]

  # -------------------------
  # Quotas (Manager) - Group-scoped user quotas (distinct groups in UI)
  # -------------------------
  /v1/projects/{projectId}/managed-groups/{groupId}/quotas/users/{userId}:
    put:
      tags: [Quotas]
      summary: Upsert a user's hard quota within a specific managed user-group scope
      description: |
        Group-scoped to preserve distinct group views in the UI.
        Caller must manage {groupId}, and {userId} must be a member of that groupId.
      operationId: upsertUserQuotaInGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserQuotaSpec" }
      responses:
        "200":
          description: Upserted quota
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserQuota" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not authorized for this group/user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

    get:
      tags: [Quotas]
      summary: Get a user's quota within a managed user-group scope
      operationId: getUserQuotaInGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: User quota lookup result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserQuotaLookupResult" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not authorized for this group/user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

    delete:
      tags: [Quotas]
      summary: Delete a user's quota (revert to default) within a managed user-group scope
      operationId: deleteUserQuotaInGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: Deleted (idempotent — also returns 204 if no explicit quota existed)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not authorized for this group/user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  /v1/projects/{projectId}/managed-groups/{groupId}/quotas/users:batchGet:
    post:
      tags: [Quotas]
      summary: Batch get quotas for members of a specific managed user-group (distinct group view)
      operationId: batchGetUserQuotasInGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchUserIdsRequest" }
      responses:
        "200":
          description: Batch quota lookup results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchUserQuotasResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not manage this group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  /v1/projects/{projectId}/managed-groups/{groupId}/usage/users:batchGet:
    post:
      tags: [Usage]
      summary: Batch get usage snapshots (CAI) for members of a specific managed user-group
      operationId: batchGetUserUsageInGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchUserUsageRequest" }
      responses:
        "200":
          description: Batch usage results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchUserUsageResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not manage this group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  /v1/projects/{projectId}/managed-groups/{groupId}/effective-quota:batchForGroup:
    post:
      tags: [Quotas, Usage]
      summary: One-call manager dashboard rows (effective limits + usage) for a managed user-group
      operationId: batchEffectiveQuotaForGroup
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchForGroupRequest" }
      responses:
        "200":
          description: Paged group dashboard results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagedEffectiveQuotaResults" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not manage this group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  /v1/projects/{projectId}/managed-groups/{groupId}/quotas/users/{userId}/audit/latest:
    get:
      tags: [Quotas]
      summary: Get latest quota change (who/when/what) for a user within a managed group context
      operationId: getLatestUserQuotaAudit
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/groupId"
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: Latest audit record (or NONE if no changes exist)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LatestQuotaAuditResult" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not authorized for this group/user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  # -------------------------
  # Default quota (Manager) - project-wide fallback
  # -------------------------
  /v1/projects/{projectId}/quotas/default:
    get:
      tags: [Quotas]
      summary: Get project default quota (manager)
      operationId: getDefaultQuota
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Default quota
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefaultQuota" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No project default quota has been set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

    put:
      tags: [Quotas]
      summary: Upsert project default quota (manager)
      operationId: upsertDefaultQuota
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserQuotaSpec" }
      responses:
        "200":
          description: Updated default quota
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefaultQuota" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
        - bearerAuth: [workbench.manager]

    delete:
      tags: [Quotas]
      summary: Delete project default quota (manager)
      operationId: deleteDefaultQuota
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No project default quota exists to delete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      security:
        - bearerAuth: [workbench.manager]

  /v1/operations/{operationId}:
    get:
      tags: [Operations]
      summary: Get operation status
      operationId: getOperation
      description: |
        Accessible to any authenticated user or manager. Server-side access control ensures
        callers can only poll operations they initiated.
      parameters:
        - name: operationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Operation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncOperation" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller did not initiate this operation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: [workbench.user]

components:
  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request body or query parameters
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }

    groupId:
      name: groupId
      in: path
      required: true
      schema: { $ref: "#/components/schemas/GroupId" }

    userId:
      name: userId
      in: path
      required: true
      schema: { $ref: "#/components/schemas/BankUserId" }

    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }

    pageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }

    pageToken:
      name: pageToken
      in: query
      required: false
      schema: { type: string }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      # NOTE: OpenAPI scopes (e.g. bearerAuth: [workbench.manager]) are only enforced
      # for oauth2/openIdConnect scheme types. For http bearer, the scope array is
      # ignored by validators and tooling — it is used here as intent documentation only.
      # Actual scope enforcement is performed server-side via Spring Security @PreAuthorize.

  schemas:
    # -------------------------
    # Identity & Directory
    # -------------------------
    BankUserId:
      type: string
      description: 1bankid used in Workbench labels.user
      minLength: 1
      maxLength: 64
      pattern: '^[A-Za-z0-9._-]+$'

    GroupId:
      type: string
      description: Unique directory group identifier (GUID/DN)
      minLength: 1
      maxLength: 128

    Self:
      type: object
      required: [userId, roles]
      properties:
        userId: { $ref: "#/components/schemas/BankUserId" }
        displayName: { type: string }
        email: { type: string }
        roles:
          type: array
          items:
            type: string
            enum: [USER, MANAGER, ADMIN]

    Group:
      type: object
      required: [groupId, displayName, source]
      properties:
        groupId: { $ref: "#/components/schemas/GroupId" }
        displayName: { type: string }
        description: { type: string }
        source:
          type: string
          enum: [ACTIVE_DIRECTORY, ENTRA_ID]
        memberCount: { type: integer, minimum: 0 }

    ManagedGroupPair:
      type: object
      required: [managerGroup, userGroup, derivedBy]
      properties:
        managerGroup: { $ref: "#/components/schemas/Group" }
        userGroup: { $ref: "#/components/schemas/Group" }
        derivedBy:
          type: string
          enum: [SUFFIX_PAIRING]

    PagedManagedGroupPairs:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ManagedGroupPair" }
        nextPageToken: { type: string }

    UserSummary:
      type: object
      required: [userId]
      properties:
        userId: { $ref: "#/components/schemas/BankUserId" }
        displayName: { type: string }
        email: { type: string }
        groupId:
          allOf:
            - $ref: "#/components/schemas/GroupId"
          description: The managed user-group this user is being viewed under (distinct group UI context)

    PagedUsers:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/UserSummary" }
        nextPageToken: { type: string }

    # -------------------------
    # Quotas
    # -------------------------
    UserQuotaSpec:
      type: object
      required: [maxInstances, maxTotalVcpu, allowedMachineTypes]
      additionalProperties: false
      properties:
        maxInstances:
          type: integer
          minimum: 0
          description: Manager-configured limit; system cap 3 still applies at enforcement.
        maxTotalVcpu:
          type: integer
          minimum: 0
        allowedMachineTypes:
          type: array
          items: { type: string }
          description: |
            Machine type allowlist. An empty array means no restriction (any machine type is permitted).
            Must contain at least one entry to actively restrict choices.
        maxBootDiskGb:
          type: integer
          minimum: 50
          default: 200
        allowedZones:
          type: array
          items: { type: string }
          description: Zone allowlist. An empty array means no zone restriction.

    UserQuota:
      type: object
      required: [projectId, groupId, userId, spec, updatedAt, updatedBy]
      properties:
        projectId: { type: string }
        groupId:
          allOf:
            - $ref: "#/components/schemas/GroupId"
          description: The managed user-group context the manager used when editing (keeps groups distinct).
        userId: { $ref: "#/components/schemas/BankUserId" }
        spec: { $ref: "#/components/schemas/UserQuotaSpec" }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: string, description: Manager principal (1bankid or subject) }

    DefaultQuota:
      type: object
      required: [projectId, spec, updatedAt, updatedBy]
      properties:
        projectId: { type: string }
        spec: { $ref: "#/components/schemas/UserQuotaSpec" }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: string }

    UserQuotaLookupResult:
      type: object
      required: [projectId, groupId, userId, status, quota, effectiveSource]
      properties:
        projectId: { type: string }
        groupId: { $ref: "#/components/schemas/GroupId" }
        userId: { $ref: "#/components/schemas/BankUserId" }
        status:
          type: string
          enum: [EXPLICIT, NONE]
        quota:
          oneOf:
            - $ref: "#/components/schemas/UserQuota"
            - type: "null"
        effectiveSource:
          type: string
          enum: [USER_QUOTA, DEFAULT_QUOTA, GLOBAL_DEFAULT]
          description: |
            Where the effective quota limit comes from:
            - USER_QUOTA: an explicit per-user quota exists (status=EXPLICIT)
            - DEFAULT_QUOTA: no explicit user quota; falling back to the project default set via PUT /quotas/default
            - GLOBAL_DEFAULT: no explicit user quota and no project default; system hardcoded cap of 3 instances applies
        note: { type: string }

    BatchUserIdsRequest:
      type: object
      required: [userIds]
      additionalProperties: false
      properties:
        userIds:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: "#/components/schemas/BankUserId" }
        includeDefault:
          type: boolean
          default: false

    BatchUserQuotasResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/UserQuotaLookupResult" }
        defaultQuota:
          oneOf:
            - $ref: "#/components/schemas/DefaultQuota"
            - type: "null"
        warnings:
          type: array
          items: { type: string }

    # -------------------------
    # Usage & Effective Limits
    # -------------------------
    SystemCaps:
      type: object
      required: [maxInstancesPerUser]
      properties:
        maxInstancesPerUser:
          type: integer
          const: 3
          description: Hard platform cap enforced regardless of manager quota.

    EffectiveLimits:
      type: object
      required: [maxInstances, maxTotalVcpu, allowedMachineTypes]
      properties:
        maxInstances:
          type: integer
          minimum: 0
          description: min(systemCaps.maxInstancesPerUser=3, manager/default quota maxInstances)
        maxTotalVcpu:
          type: integer
          minimum: 0
        allowedMachineTypes:
          type: array
          items: { type: string }
        maxBootDiskGb:
          type: integer
          minimum: 50
        allowedZones:
          type: array
          items: { type: string }

    UsageTotals:
      type: object
      required: [instances, totalVcpu]
      properties:
        instances: { type: integer, minimum: 0 }
        totalVcpu: { type: integer, minimum: 0 }

    UsageComputation:
      type: object
      required: [computedFrom, assetType, query]
      properties:
        computedFrom:
          type: string
          enum: [CLOUD_ASSET_INVENTORY]
        assetType:
          type: string
          const: compute.googleapis.com/Instance
        query:
          type: string
          description: CAI query used.
          example: "labels.notebooks-product:* AND labels.user:u12345"

    UserQuotaUsage:
      type: object
      required: [projectId, userId, computedAt, computation, systemCaps, effectiveLimits, usage, remaining]
      properties:
        projectId: { type: string }
        userId: { $ref: "#/components/schemas/BankUserId" }
        computedAt: { type: string, format: date-time }
        computation: { $ref: "#/components/schemas/UsageComputation" }
        systemCaps: { $ref: "#/components/schemas/SystemCaps" }
        effectiveLimits: { $ref: "#/components/schemas/EffectiveLimits" }
        usage: { $ref: "#/components/schemas/UsageTotals" }
        remaining: { $ref: "#/components/schemas/UsageTotals" }

    BatchUserUsageRequest:
      type: object
      required: [userIds]
      additionalProperties: false
      properties:
        userIds:
          type: array
          minItems: 1
          maxItems: 500
          items: { $ref: "#/components/schemas/BankUserId" }
        includeLimits:
          type: boolean
          default: true

    BatchUserUsageResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/UserQuotaUsage" }
        warnings:
          type: array
          items: { type: string }

    BatchForGroupRequest:
      type: object
      additionalProperties: false
      properties:
        includeUsage:
          type: boolean
          default: true
        pageSize:
          type: integer
          minimum: 1
          maximum: 500
          default: 200
        pageToken: { type: string }

    EffectiveQuotaResult:
      type: object
      required: [projectId, groupId, userId, systemCaps, effectiveLimits, status, effectiveSource, usage, remaining]
      properties:
        projectId: { type: string }
        groupId:
          allOf:
            - $ref: "#/components/schemas/GroupId"
          description: The managed user-group context (distinct group in UI)
        userId: { $ref: "#/components/schemas/BankUserId" }
        systemCaps: { $ref: "#/components/schemas/SystemCaps" }
        effectiveLimits: { $ref: "#/components/schemas/EffectiveLimits" }
        status:
          type: string
          enum: [EXPLICIT, NONE]
        effectiveSource:
          type: string
          enum: [USER_QUOTA, DEFAULT_QUOTA, GLOBAL_DEFAULT]
        usage: { $ref: "#/components/schemas/UsageTotals" }
        remaining: { $ref: "#/components/schemas/UsageTotals" }

    PagedEffectiveQuotaResults:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/EffectiveQuotaResult" }
        nextPageToken: { type: string }

    # -------------------------
    # Audit
    # -------------------------
    LatestQuotaAuditResult:
      type: object
      required: [projectId, groupId, userId, status, latest]
      properties:
        projectId: { type: string }
        groupId: { $ref: "#/components/schemas/GroupId" }
        userId: { $ref: "#/components/schemas/BankUserId" }
        status:
          type: string
          enum: [PRESENT, NONE]
        latest:
          oneOf:
            - $ref: "#/components/schemas/QuotaAuditEvent"
            - type: "null"

    QuotaAuditEvent:
      type: object
      required: [eventId, action, at, actor, context]
      properties:
        eventId: { type: string }
        action:
          type: string
          enum: [UPSERT, DELETE]
        at:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/AuditActor"
        context:
          $ref: "#/components/schemas/AuditContext"
        oldSpec:
          oneOf:
            - $ref: "#/components/schemas/UserQuotaSpec"
            - type: "null"
        newSpec:
          oneOf:
            - $ref: "#/components/schemas/UserQuotaSpec"
            - type: "null"

    AuditActor:
      type: object
      required: [principal]
      properties:
        principal:
          type: string
          description: Manager identity (JWT subject / 1bankid / email depending on your auth)
        displayName: { type: string }
        email: { type: string }

    AuditContext:
      type: object
      required: [groupId]
      properties:
        groupId:
          allOf:
            - $ref: "#/components/schemas/GroupId"
          description: Managed user-group context used for the change (distinct group UI)
        managerGroupId:
          oneOf:
            - $ref: "#/components/schemas/GroupId"
            - type: "null"
          description: |
            The *_Managers group the actor belongs to, derived from the *_Managers↔*_Users naming convention.
            Null only when the change was made by a system/admin process outside the manager group pairing flow.

    # -------------------------
    # Workbench instance models
    # -------------------------
    CreateInstanceRequest:
      type: object
      required: [displayName, zone, machineType]
      additionalProperties: false
      properties:
        displayName: { type: string }
        zone: { type: string }
        machineType: { type: string }
        bootDiskGb: { type: integer, minimum: 50 }
        labels:
          type: object
          additionalProperties: { type: string }
          description: Optional extra labels; server will set/overwrite labels.user=<caller 1bankid>.

    WorkbenchInstance:
      type: object
      required: [id, displayName, state, machineType, zone, ownerUserId, createdAt]
      properties:
        id: { type: string }
        displayName: { type: string }
        state: { type: string, enum: [PROVISIONING, RUNNING, STOPPED, DELETING, ERROR] }
        machineType: { type: string }
        zone: { type: string }
        ownerUserId: { $ref: "#/components/schemas/BankUserId" }
        createdAt: { type: string, format: date-time }

    # -------------------------
    # Operations & Errors
    # -------------------------
    AsyncOperation:
      type: object
      required: [id, status, createdAt]
      properties:
        id: { type: string }
        status: { type: string, enum: [PENDING, RUNNING, DONE, FAILED] }
        createdAt: { type: string, format: date-time }
        doneAt: { type: string, format: date-time }
        resourceId: { type: string }
        error:
          oneOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"

    Violation:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - SYSTEM_MAX_INSTANCES_EXCEEDED
            - MAX_INSTANCES_EXCEEDED
            - MAX_VCPU_EXCEEDED
            - MACHINE_TYPE_NOT_ALLOWED
            - ZONE_NOT_ALLOWED
            - DISK_TOO_LARGE
        message: { type: string }
        details:
          type: object
          additionalProperties: true
          description: Optional structured context for this violation.
          properties:
            limit: { type: integer, description: The applicable limit that was exceeded }
            current: { type: integer, description: The caller's current value at the time of the check }
            requested: { type: integer, description: The value that was requested }
            value: { type: string, description: The specific disallowed value (e.g. machine type or zone name) }

    QuotaViolationError:
      type: object
      required: [error, violations, snapshot]
      properties:
        error:
          type: string
          enum: [QUOTA_VIOLATION]
        violations:
          type: array
          items: { $ref: "#/components/schemas/Violation" }
        snapshot:
          $ref: "#/components/schemas/UserQuotaUsage"

    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
        code: { type: string }
        requestId: { type: string, description: Correlation ID for tracing this error in server logs }
